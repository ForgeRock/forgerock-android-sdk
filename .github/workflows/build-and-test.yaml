name: Build and Test
on:
  workflow_call:
    secrets:
      SLACK_WEBHOOK:
        description: Slack Notifier Incoming Webhook
        required: true
      CODECOV_TOKEN:
        description: Codecov token
        required: true
jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Clone the repo
      - name: Clone the repository
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{github.event.pull_request.head.repo.full_name}}
          fetch-depth: 0

      # Setup JDK and cache and restore dependencies.
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      # Execute all debug unit tests with coverage report
      - name: Run debug unit tests
        run: ./gradlew --rerun-tasks testDebugUnitTestCoverage --stacktrace --no-daemon
      
      # Publish test reports for the unit tests
      - name: Publish test results
        if: success() || failure()
        uses: dorny/test-reporter@v2
        with:
          name: Unit tests results
          path: '**/build/test-results/**/TEST-*.xml'
          list-suites: 'all'
          list-tests: 'failed'
          fail-on-error: 'true'
          fail-on-empty: 'true'
          reporter: java-junit

      - name: Upload Android Test Report (HTML)
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: unti-tests-report
          path: '**/build/reports/tests/testDebugUnitTest/**'

      # Upload coverage reports to Codecov
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: forgerock-core/build/coverage-report/test-coverage.xml, forgerock-auth/build/coverage-report/test-coverage.xml, forgerock-authenticator/build/coverage-report/test-coverage.xml, ping-protect/build/coverage-report/test-coverage.xml
          flags: unit-tests

      - uses: 8398a7/action-slack@v3
        with:
          mention: 'stoyan.petrov,andy.witrisna'
          if_mention: 'failure,cancelled'
          fields: repo,author,eventName,message,job,pullRequest,took
          status: ${{ job.status }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        if: always()