name: Run Mend SAST Scan
on:
  workflow_call:
    secrets:
      MEND_EMAIL:
        description: Mend email
        required: true
      MEND_USER_KEY:
        description: Mend user key
        required: true
      SLACK_WEBHOOK:
        description: Slack Notifier Incoming Webhook
        required: true
      
jobs:
  mend-sast-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Clone the repository
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{github.event.pull_request.head.repo.full_name}}
          fetch-depth: 0

      - name: Download and cache the Mend CLI executable
        id: cache-mend
        uses: actions/cache@v3
        env:
          mend-cache-name: cache-mend-executable
        with:
          path: /usr/local/bin/mend
          key: ${{ runner.os }}-${{ env.mend-cache-name }}-${{ hashFiles('/usr/local/bin/mend') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.mend-cache-name }}-

      - if: ${{ steps.cache-mend.outputs.cache-hit != 'true' }}
        name: Download Mend CLI executable (cache miss...)
        continue-on-error: true
        shell: bash
        run: |
          curl https://downloads.mend.io/cli/linux_amd64/mend -o /usr/local/bin/mend && chmod +x /usr/local/bin/mend

      - name: Mend SAST scan
        env:
          MEND_EMAIL: ${{ secrets.MEND_EMAIL }}
          MEND_USER_KEY: ${{ secrets.MEND_USER_KEY }}
          MEND_URL: ${{ vars.MEND_SERVER_URL }}
          MEND_SAST_PATH_EXCLUSIONS: ${{ vars.MEND_SAST_PATH_EXCLUSIONS }}
        shell: bash
        timeout-minutes: 20
        run: |
          mend code --report --filename ${{ vars.MEND_SAST_REPORT_NAME }} --formats json --non-interactive --scope ${{ vars.MEND_PRODUCT_NAME }}//${{ vars.MEND_PROJECT_NAME }} > mend-sast-scan-result.txt

          export MEND_SAST_TOTAL_VULNERABILITIES_COUNT=$(jq '.[0].stats.totalVulnerabilities' ${{ vars.MEND_SAST_REPORT_NAME }}.json)
          export MEND_SAST_CRITICAL_COUNT=$(jq '.[0].stats.critical' ${{ vars.MEND_SAST_REPORT_NAME }}.json)
          export MEND_SAST_HIGH_COUNT=$(jq '.[0].stats.high' ${{ vars.MEND_SAST_REPORT_NAME }}.json)
          export MEND_SAST_MEDIUM_COUNT=$(jq '.[0].stats.medium' ${{ vars.MEND_SAST_REPORT_NAME }}.json)
          export MEND_SAST_LOW_COUNT=$(jq '.[0].stats.low' ${{ vars.MEND_SAST_REPORT_NAME }}.json)
          export MEND_SAST_SCAN_URL=$(grep -Eo '(http|https)://[^ ]+' mend-sast-scan-result.txt)

          echo "MEND_SAST_TOTAL_VULNERABILITIES_COUNT=$MEND_SAST_TOTAL_VULNERABILITIES_COUNT" >> $GITHUB_ENV
          echo "MEND_SAST_CRITICAL_COUNT=$MEND_SAST_CRITICAL_COUNT" >> $GITHUB_ENV
          echo "MEND_SAST_HIGH_COUNT=$MEND_SAST_HIGH_COUNT" >> $GITHUB_ENV
          echo "MEND_SAST_MEDIUM_COUNT=$MEND_SAST_MEDIUM_COUNT" >> $GITHUB_ENV
          echo "MEND_SAST_LOW_COUNT=$MEND_SAST_LOW_COUNT" >> $GITHUB_ENV
          echo "MEND_SAST_SCAN_URL=$MEND_SAST_SCAN_URL" >> $GITHUB_ENV

      - name: Show the SAST Report in Summary
        shell: bash
        run: |
          # Determine badge color based on severity
          if [ "$MEND_SAST_CRITICAL_COUNT" -gt 0 ]; then
            BADGE_COLOR="red"
            BADGE_TEXT="${MEND_SAST_CRITICAL_COUNT}_critical"
          elif [ "$MEND_SAST_HIGH_COUNT" -gt 0 ]; then
            BADGE_COLOR="orange"
            BADGE_TEXT="${MEND_SAST_HIGH_COUNT}_high"
          elif [ "$MEND_SAST_MEDIUM_COUNT" -gt 0 ]; then
            BADGE_COLOR="yellow"
            BADGE_TEXT="${MEND_SAST_MEDIUM_COUNT}_medium"
          elif [ "$MEND_SAST_LOW_COUNT" -gt 0 ]; then
            BADGE_COLOR="blue"
            BADGE_TEXT="${MEND_SAST_LOW_COUNT}_low"
          else
            BADGE_COLOR="brightgreen"
            BADGE_TEXT="clean"
          fi

          BADGE_URL="https://img.shields.io/badge/SAST-${BADGE_TEXT}-${BADGE_COLOR}"

          echo "## Mend SAST Report ![SAST Badge](${BADGE_URL})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Add a table summarizing results
          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔴 Critical | $MEND_SAST_CRITICAL_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟠 High     | $MEND_SAST_HIGH_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟡 Medium   | $MEND_SAST_MEDIUM_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔵 Low      | $MEND_SAST_LOW_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Add Mend report link if available
          if [ -n "$MEND_SAST_SCAN_URL" ]; then
            echo "**🔗 [View Full Mend SAST Report]($MEND_SAST_SCAN_URL)**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # Add expandable section with raw scan output
          echo "<details><summary>Expand for details</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat mend-sast-scan-result.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

      # Step 1: Decide Check Conclusion
      - name: Determine Mend SAST Check Conclusion
        id: sast_conclusion
        shell: bash
        run: |
          if [ "$MEND_SAST_CRITICAL_COUNT" -gt 0 ] || [ "$MEND_SAST_HIGH_COUNT" -gt 0 ]; then
            echo "conclusion=failure" >> $GITHUB_OUTPUT
          else
            echo "conclusion=success" >> $GITHUB_OUTPUT
          fi

      # Step 2: Publish Mend SAST Check
      - name: Publish Mend SAST Check
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('mend-sast-scan-result.txt', 'utf8');

            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: "Mend SAST Report",
              head_sha: context.sha,
              status: "completed",
              conclusion: "${{ steps.sast_conclusion.outputs.conclusion }}",
              output: {
                title: "Mend SAST Report",
                summary: `Critical: ${process.env.MEND_SAST_CRITICAL_COUNT}, High: ${process.env.MEND_SAST_HIGH_COUNT}`,
                text: "```\n" + body + "\n```"
              }
            });

      - name: Upload SAST scan report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mend-sast-report
          path: |
            mend-sast-scan-result.txt
            ${{ vars.MEND_SAST_REPORT_NAME }}.json

      - name: Send slack notification
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: custom
          fields: all
          custom_payload: |
            {
              "text": "*Mend SAST Scan Results*",
              "attachments": [
                {
                  "color": "${{ job.status == 'success' && 'good' || 'danger' }}",
                  "fields": [
                    {
                      "title": "SAST scan",
                      "value": "Total: ${{ env.MEND_SAST_TOTAL_VULNERABILITIES_COUNT }} | Critical: ${{ env.MEND_SAST_CRITICAL_COUNT }} | High: ${{ env.MEND_SAST_HIGH_COUNT }} | Medium: ${{ env.MEND_SAST_MEDIUM_COUNT }} | Low: ${{ env.MEND_SAST_LOW_COUNT }}\n<${{ env.MEND_SAST_SCAN_URL }}|View full SAST report>",
                      "short": false
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}